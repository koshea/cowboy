    context_window: 200000
    max_tokens: 16000
    temperature: 1.0
  - prefix: anthropic/claude-fable
    name: "Claude Fable"
    context_window: 200000
    max_tokens: 32000
    temperature: 1.0
    reasoning_effort: medium
