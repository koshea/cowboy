# Recommended defaults for known models, shipped with cowboy.
#
# Override or extend without a code release via ~/.config/cowboy/model-defaults.yaml
# (same schema; entries there win). Match by exact `id` or by `prefix`
# (longest match wins). Fields: name, context_window, max_tokens, temperature,
# reasoning_effort (minimal|low|medium|high), chat (default true).
#
# Values are best-effort baselines you can tweak per-model when adding one; the
# point is sensible prefills, not perfection.
version: 1
models:
  # --- Anthropic (200K context, extended thinking) ------------------------
  - prefix: anthropic/claude-opus
    name: "Claude Opus"
    context_window: 200000
    max_tokens: 32000
    temperature: 1.0
    reasoning_effort: high
  - prefix: anthropic/claude-sonnet
    name: "Claude Sonnet"
    context_window: 200000
    max_tokens: 32000
    temperature: 1.0
    reasoning_effort: medium
