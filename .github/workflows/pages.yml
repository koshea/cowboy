name: Deploy docs to Pages

# Publishes the mdBook site (docs/) to GitHub Pages on every push to main.
#
# One-time setup before this can succeed: in the repo, go to
# Settings → Pages → Build and deployment → Source = "GitHub Actions".
# If you're not ready to publish the docs yet, delete this file.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: Build the book
        run: mdbook build docs

      # The published artifact is docs/book, so a repo-root CNAME (custom domain)
      # must be copied in or the domain is dropped on each deploy.
      - name: Add CNAME (custom domain) to the site
        run: '[ -f CNAME ] && cp CNAME docs/book/CNAME || echo "no CNAME; skipping"'

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

      - id: deployment
        uses: actions/deploy-pages@v4
