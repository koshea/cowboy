name: Publish images

# Builds the agent + gateway container images and publishes them to GHCR as
# multi-arch (amd64 + arm64) manifests. Each architecture is built on its own
# native runner (no QEMU), pushed by digest, then merged into one manifest list.
#
# Images: ghcr.io/<owner>/cowboy/agent and .../cowboy/gateway. The `cowboy`
# binary pulls these version-pinned by default (see cowboy-cli DEFAULT_IMAGE /
# cowboy-gateway GATEWAY_IMAGE), so the Cargo version is always published as a tag.
#
# One-time setup: after the first successful run, set both packages to **public**
# (repo → Packages → each package → Settings → Change visibility) so end users
# pull without `docker login`. arm64 native runners are free for public repos.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # ghcr.io/<owner>/<repo> — the two images are <prefix>/agent and <prefix>/gateway.
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  version:
    name: resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        name: Read workspace version from Cargo.toml
        run: echo "version=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"

  build:
    name: build ${{ matrix.image }} (${{ matrix.platform.arch }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        image: [agent, gateway]
        platform:
          - { name: linux/amd64, runner: ubuntu-24.04, arch: amd64 }
          - { name: linux/arm64, runner: ubuntu-24.04-arm, arch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.image }}.Dockerfile
          platforms: ${{ matrix.platform.name }}
          outputs: type=image,name=${{ env.IMAGE_PREFIX }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image }}-${{ matrix.platform.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: merge ${{ matrix.image }} manifest
    needs: [version, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [agent, gateway]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          # Intentional word-splitting: expand the tag flags and per-arch digests
          # into separate args for `imagetools create`.
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_PREFIX }}/${{ matrix.image }}@sha256:%s ' *)

      - name: Inspect
        run: |
          docker buildx imagetools inspect \
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ needs.version.outputs.version }}
